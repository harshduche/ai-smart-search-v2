# Cloud Deployment: Model Server + Workers + API on GPU Machine
# Connects to external RabbitMQ and Qdrant (configured via .env)
#
# Architecture:
#   model-server  (GPU)  -- single instance, owns the embedding model
#   worker        (CPU)  -- N instances, consume RMQ jobs, call model-server
#   api           (CPU)  -- serves search HTTP, calls model-server
#
# Usage:
#   docker compose -f docker-compose.cloud.yml up -d --scale worker=4

services:
  # ---------------------------------------------------------------
  # Model Server (GPU) -- single shared embedding service
  # ---------------------------------------------------------------
  model-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-rag-model-server
    ports:
      - "8001:8001"
    volumes:
      - ./models:/app/models
      - ./.env:/app/.env
    env_file:
      - .env
    environment:
      DEVICE: cuda
      BATCH_SIZE: "8"
      MODEL_SERVER_PORT: "8001"
      BATCH_WINDOW_MS: "100"
      MAX_BATCH_SIZE: "8"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["python3", "model_server_batched.py"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; r=requests.get('http://localhost:8001/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ---------------------------------------------------------------
  # Workers (CPU) -- connect to external RabbitMQ and Qdrant via .env
  # Scale with: --scale worker=N
  # ---------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env
      - ./data:/app/data
    env_file:
      - .env
    environment:
      RABBITMQ_QUEUE: embedding.jobs
      RABBITMQ_PREFETCH_COUNT: "1"
      USE_REMOTE_EMBEDDINGS: "true"
      MODEL_SERVER_URL: http://model-server:8001
      MODEL_SERVER_TIMEOUT: "300"
      DEVICE: cpu
      SAVE_FULL_FRAMES: "false"
      SAVE_THUMBNAILS: "false"
    depends_on:
      model-server:
        condition: service_healthy
    restart: unless-stopped
    command: ["python3", "worker.py"]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "worker.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------
  # API Server (CPU) -- serves search requests, calls model-server
  # ---------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    ports:
      - "8000:8000"
    volumes:
      - ./.env:/app/.env
    env_file:
      - .env
    environment:
      USE_REMOTE_EMBEDDINGS: "true"
      MODEL_SERVER_URL: http://model-server:8001
      MODEL_SERVER_TIMEOUT: "60"
      DEVICE: cpu
      PRELOAD_MODELS: "true"
      API_HOST: 0.0.0.0
      API_PORT: "8000"
    depends_on:
      model-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; r=requests.get('http://localhost:8000/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
